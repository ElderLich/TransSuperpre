name: Dump FR Workspace

on:
  workflow_dispatch:
  schedule:
    - cron: "45 8 * * *"
  push:
    branches:
      - main
    paths:
      - "FR/Workspace/test-release.cdb"
      - ".github/scripts/dump_cdb.py"
      - ".github/workflows/fr-dump-workspace.yml"

permissions:
  contents: write

concurrency:
  group: fr-dump-workspace
  cancel-in-progress: false

jobs:
  dump:
    name: Publish FR dump folder
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate dump files
        run: |
          python .github/scripts/dump_cdb.py \
            --cdb "FR/Workspace/test-release.cdb" \
            --out "$RUNNER_TEMP/fr-workspace-dump" \
            --source-sha "$GITHUB_SHA" \
            --source-path "FR/Workspace/test-release.cdb" \
            --title "FR Workspace test-release.cdb Dump"

      - name: Publish dump branch
        env:
          DUMP_DIR: ${{ runner.temp }}/fr-workspace-dump
        run: |
          set -euo pipefail
          git config user.name "ElderLich"
          git config user.email "35314175+ElderLich@users.noreply.github.com"

          push_dump() {
            for attempt in 1 2 3; do
              if git push origin dump; then
                return 0
              fi
              echo "Dump push failed; rebasing and retrying (${attempt}/3)..."
              git pull --rebase origin dump
            done
            git push origin dump
          }

          if git ls-remote --exit-code --heads origin dump >/dev/null 2>&1; then
            git fetch origin dump
            git checkout -B dump origin/dump
          else
            git checkout --orphan dump
            git rm -r -f --ignore-unmatch .
          fi

          git rm -r -f --ignore-unmatch FR
          git rm -r -f --ignore-unmatch cards manifest.json schema.sql datas.csv texts.csv cards-index.csv
          mkdir -p FR
          cp -a "$DUMP_DIR"/. FR/
          rm -f FR/.gitattributes FR/.nojekyll

          cat > README.md <<'EOF'
          # TransSuperpre CDB Dumps

          Generated database dumps for reviewing translation CDB changes as text diffs.

          - `DE/`: DE Workspace `test-release.cdb`
          - `EN/`: EN Workspace `test-release.cdb`
          - `ES/`: ES Workspace `test-release.cdb`
          - `FR/`: FR Workspace `test-release.cdb`
          - `IT/`: IT Workspace `test-release.cdb`
          - `JP/`: JP Workspace `test-release.cdb`
          - `KR/`: KR Workspace `test-release.cdb`
          - `PT/`: PT Workspace `test-release.cdb`
          - `ZH-TW/`: ZH-TW Base Files `test-release.cdb`
          EOF
          printf "" > .nojekyll
          printf "*.csv diff\n*.json diff\n*.sql diff\n*.txt diff\n" > .gitattributes

          git add .
          if git diff --cached --quiet; then
            echo "No FR dump changes to publish."
            exit 0
          fi
          short_sha="${GITHUB_SHA::7}"
          git commit -m "Dump FR workspace from ${short_sha}"
          push_dump
