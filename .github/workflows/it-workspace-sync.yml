name: Sync IT Workspace

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * *"
  push:
    branches:
      - main
    paths:
      - "IT/Workspace/Mappings.csv"
      - ".github/scripts/tcg_autopr.py"
      - ".github/workflows/it-workspace-sync.yml"
      - "Tools/PromptPatcher.py"

permissions:
  contents: write

concurrency:
  group: transsuperpre-main-writers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Import new IT cards and prompts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync and commit workspace updates
        run: |
          set -euo pipefail
          git config user.name "ElderLich"
          git config user.email "35314175+ElderLich@users.noreply.github.com"
          branch="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3; do
            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"

            python .github/scripts/tcg_autopr.py --lang it workspace-sync
            git add -A "IT/Workspace" "IT/Base Files/test-release.cdb" "IT/Base Files/test-strings.conf" Tools/PromptPatcher.py
            if git diff --cached --quiet; then
              echo "No IT workspace changes to commit."
              exit 0
            fi

            git commit -m "Sync IT workspace"
            if git push origin "HEAD:$branch"; then
              exit 0
            fi

            echo "Push failed; refreshing and rebuilding (${attempt}/3)..."
          done

          echo "Unable to push IT workspace sync after rebuilding on the latest branch tip."
          exit 1
