name: AutoPR ZH-TW

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/autopr_zh_tw.py"
      - ".github/workflows/autopr-zh-tw.yml"

permissions:
  contents: write

concurrency:
  group: autopr-zh-tw
  cancel-in-progress: false

jobs:
  build-zh-tw:
    name: Build ZH-TW package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout TransSuperpre
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout CardEditor expansions
        uses: actions/checkout@v4
        with:
          repository: salix5/CardEditor
          ref: master
          path: _cardeditor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build package from AutoPR sources
        run: python .github/scripts/autopr_zh_tw.py
        env:
          TW_AUTOPR_CARDEDITOR_EXPANSIONS_DIR: ${{ github.workspace }}/_cardeditor/expansions
          TW_AUTOPR_CARDS_CDB_URL: https://github.com/salix5/cdb/releases/download/snapshot/cards.cdb

      - name: Commit generated outputs
        run: |
          git config user.name "ElderLich"
          git config user.email "vulgrim690@gmail.com"
          git add ZH-TW/ygopro-super-pre.ypk ZH-TW/test-release.json ZH-TW/version.txt
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
            rm -f ZH-TW/.autopr-commit-body.txt
            exit 0
          fi
          latest_tag=$(git tag --list 'TW-v*' | sed -E 's/^TW-v([0-9]+)$/\1/' | grep -E '^[0-9]+$' | sort -n | tail -1)
          next_tag_number=$(( ${latest_tag:-0} + 1 ))
          tag="TW-v${next_tag_number}"
          commit_message=$(mktemp)
          printf "預發布卡片更新 TW - v%s\n\n" "$next_tag_number" > "$commit_message"
          cat ZH-TW/.autopr-commit-body.txt >> "$commit_message"
          git commit -F "$commit_message"
          rm -f "$commit_message" ZH-TW/.autopr-commit-body.txt
          git tag -a "$tag" -m "Release $tag"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}" --follow-tags